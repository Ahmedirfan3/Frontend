<main>
    <h2>Course Registration</h2>
    <form class="form">
        <label for="studentid">Student ID:</label>
        <input type="text" id="studentid" placeholder="Enter Student ID" required>

        <label for="course">Select Course:</label>
        <select id="course">
            <option>CS101 - Intro to Programming</option>
            <option>CS201 - Data Structures</option>
            <option>CS301 - DBMS</option>
            <option>CS401 - Web Development</option>
        </select>

        <button class="btn" type="submit">Register</button>
    </form>
</main>
